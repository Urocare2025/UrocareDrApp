<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Unregister SW</title>
  <style>
    body { font-family: system-ui, Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
    button { padding: 14px 24px; font-size: 16px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #dc2626; }
    pre { background: #f1f5f9; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Unregister Service Workers & Clear Cache</h2>
  <p>This will clear old cached version (MyMedLedger) so MedLedger appears correctly.</p>
  
  <button id="u">Unregister All SWs & Clear Cache</button>
  <pre id="out"></pre>

<script>
async function log(msg) {
  document.getElementById('out').textContent += msg + '\n';
}

document.getElementById('u').addEventListener('click', async () => {
  const out = document.getElementById('out');
  out.textContent = '';

  try {
    await log('Starting cleanup...');

    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await log(`Found ${regs.length} service worker(s)`);
      
      for (let reg of regs) {
        await reg.unregister();
        await log('Unregistered: ' + (reg.scope || 'unknown'));
      }
    }

    if ('caches' in window) {
      const keys = await caches.keys();
      for (let key of keys) {
        await caches.delete(key);
        await log('Deleted cache: ' + key);
      }
    }

    await log('\n✅ Done! Now hard refresh the main app.');
    await log('Go back and press Ctrl + Shift + R on the main page.');

  } catch (err) {
    await log('Error: ' + err);
  }
});
</script>
</body>
</html>
